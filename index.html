<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateurs Absurdes du Bureau</title>
<link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Animate.css -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🎲 Générateurs Absurdes du Bureau</h1>

<nav class="menu-bar">
  <button class="menu-toggle" onclick="toggleMenu()" title="Menu"><i class="fas fa-bars"></i></button>
  <a href="#" data-tooltip="Chiffrage flou" onclick="setGenerator('estimate', 'Chiffrage flou')" id="menu-estimate">
    <span class="icon">📊</span>Chiffrage
  </a>
  <a href="#" data-tooltip="Rappel saisie temps" onclick="setGenerator('timesheet', 'Rappel saisie temps')" id="menu-timesheet">
    <span class="icon">🧾</span>Jira
  </a>
  <a href="#" data-tooltip="Excuse" onclick="setGenerator('excuse', 'Excuse')" id="menu-excuse">
    <span class="icon">🙃</span>Excuse
  </a>
  <a href="#" data-tooltip="Bug report honnête" onclick="setGenerator('bug', 'Bug report honnête')" id="menu-bug">
    <span class="icon">🐞</span>Bug
  </a>
  <a href="#" data-tooltip="Réunion absurde" onclick="setGenerator('meeting', 'Réunion absurde')" id="menu-meeting">
    <span class="icon">📅</span>Réunion
  </a>
</nav>

<h1 id="current-generator">Sélectionnez une option</h1>


<div id="result"></div>


  
<div class="action-bar">
  <button onclick="generate()" title="Générer"><i class="fas fa-sync-alt"></i></button>
  <button onclick="copyResult()" title="Copier"><i class="fas fa-copy"></i></button>
</div>
</div>

<script src="main.js"></script>
<script src="estimate.js"></script>
<script src="jira.js"></script>
<script src="excuse.js"></script>
<script src="bug.js"></script>
<script src="meeting.js"></script>
</body>
</html>
