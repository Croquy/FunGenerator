<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateurs Absurdes du Bureau</title>
<link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🎲 Générateurs Absurdes du Bureau</h1>

<div class="button-group" id="menu">
<button onclick="setGenerator('estimate')">📊 Chiffrage flou</button>
<button onclick="setGenerator('timesheet')">🧾 Rappel saisie temps</button>
<button onclick="setGenerator('excuse')">🙃 Excuse projet</button>
<button onclick="setGenerator('bug')">🐞 Bug report honnête</button>
<button onclick="setGenerator('meeting')">📅 Réunion absurde</button>
</div>

<div class="action-bar">
  <button onclick="generate()" title="Générer"><i class="fas fa-sync-alt"></i></button>
  <button onclick="copyResult()" title="Copier"><i class="fas fa-copy"></i></button>
</div>

<div id="result"></div>

</div>

<script src="main.js"></script>
<script src="estimate.js"></script>
</body>
</html>
