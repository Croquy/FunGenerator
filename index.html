<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateurs Absurdes du Bureau</title>
<link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Animate.css -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🎲 Générateurs Absurdes du Bureau</h1>

<nav class="menu-bar">
  <a href="#" data-tooltip="Chiffrage flou complet" onclick="setGenerator('estimate', 'Chiffrage flou complet')">
    <span class="icon">📊</span>Chiffrage
  </a>
  <a href="#" data-tooltip="Rappel saisie temps complet" onclick="setGenerator('timesheet', 'Rappel saisie temps complet')">
    <span class="icon">🧾</span>Jira
  </a>
  <a href="#" data-tooltip="Excuse projet détaillée" onclick="setGenerator('excuse', 'Excuse projet détaillée')">
    <span class="icon">🙃</span>Excuse
  </a>
  <a href="#" data-tooltip="Bug report honnête complet" onclick="setGenerator('bug', 'Bug report honnête complet')">
    <span class="icon">🐞</span>Bug
  </a>
  <a href="#" data-tooltip="Réunion absurde complète" onclick="setGenerator('meeting', 'Réunion absurde complète')">
    <span class="icon">📅</span>Réunion
  </a>
</nav>

<h2 id="current-generator">Sélectionnez une option</h2>


<div id="result"></div>


  
<div class="action-bar">
  <button onclick="generate()" title="Générer"><i class="fas fa-sync-alt"></i></button>
  <button onclick="copyResult()" title="Copier"><i class="fas fa-copy"></i></button>
</div>
</div>

<script src="main.js"></script>
<script src="estimate.js"></script>
</body>
</html>
